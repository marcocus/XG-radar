.gol-ring2{animation-delay:.3s;opacity:0}
.gol-particles{position:absolute;inset:0;overflow:hidden}
@keyframes golpop{0%{transform:scale(0.4) rotate(-8deg);opacity:0}60%{transform:scale(1.12) rotate(2deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes golslide{to{opacity:1;transform:translateY(0)}}
@keyframes golring{0%{transform:scale(0.2);opacity:1}100%{transform:scale(2.5);opacity:0}}
@keyframes particle{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
@keyframes flashbg{0%,100%{background:rgba(34,197,94,0)}25%,75%{background:rgba(34,197,94,0.15)}}

@keyframes dotpulse{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}

// -- CIES Observatory: coefficiente ranking club
function ciesBoost(name){
  const t=td(name);
  if(t.rank<=2)  return 1.10;
  if(t.rank<=5)  return 1.05;
  if(t.rank<=10) return 1.01;
  return 0.97;
}

// -- Transfermarkt: valore mercato -> bonus offensivo
function tmvBonus(name){
  const t=td(name);
  const tmNorm=Math.min((t.tm||150)/900,1); // normalizza su PSG=900M? max
  const formNorm=(t.form||7)/15;
  return 0.88+(tmNorm*0.5+formNorm*0.5)*0.28; // range 0.88?1.16
}

// -- OpenFootball / SFStats / FBref: clean sheet rate adversary penalty
function csRateMult(attackerName, defenderName){
  const def=td(defenderName);
  const cs=def.cs||0.25;
  if(cs>0.40) return XG_COEFF.cs_penalty;      // difesa forte -> riduce xG
  if(cs<0.20) return 1+(0.20-cs)*0.8;           // difesa debole -> aumenta xG
  return 1.0;
}

// -- Understat / FBref: xgF storico stagione come prior offensivo
function xgFPrior(name){
  const t=td(name);
  return t.xgF||1.25; // xG for per partita stagione in corso
}

// -- ScoreTrend / Flashscore / Fotmob: momentum offensivo ultimi 10'
function momentumBoost(m,side){
  const min=Math.max(m.min,1);
  const corn=side==='h'?(m.hCorn||0):(m.aCorn||0);
  const datt=side==='h'?(m.hDangAtt||0):(m.aDangAtt||0);
  const cornRate=corn/min, dattRate=datt/min;
  if(cornRate>0.15||dattRate>1.5) return XG_COEFF.trend_boost;
  if(cornRate>0.10||dattRate>1.0) return XG_COEFF.momentum_win;
  return 1.0;
}

// =============== calcXG - MOTORE PRINCIPALE ===========================
function calcXG(m){
  const min=Math.max(m.min,1);
  const hT=td(m.home), aT=td(m.away);
  const C=XG_COEFF;

  // -- A: Shot quality (StatsBomb . Opta . Understat . FBref . WhoScored . SFStats)
  const hShot=(m.hSOT||0)*C.sot
             +Math.max((m.hSh||0)-(m.hSOT||0),0)*C.shot_off
             +(m.hBC||0)*C.big_chance
             +(m.hSOT||0)*C.postshot_adj
             +(m.hSh||0)*C.sot_pct_bonus;
  const aShot=(m.aSOT||0)*C.sot
             +Math.max((m.aSh||0)-(m.aSOT||0),0)*C.shot_off
             +(m.aBC||0)*C.big_chance
             +(m.aSOT||0)*C.postshot_adj
             +(m.aSh||0)*C.sot_pct_bonus;

  // -- B: Pressione territorio (Overlyzer . Sofascore . Fotmob . Wyscout . Diretta . Flashscore)
  const hPress=(m.hCorn||0)*C.corner+(m.hDangAtt||0)*C.dang_att+(m.hOffZone||0)*C.flash_zone;
  const aPress=(m.aCorn||0)*C.corner+(m.aDangAtt||0)*C.dang_att+(m.aOffZone||0)*C.flash_zone;

  // -- B2: PPDA possesso (Wyscout . FBref . CIES)
  const hPoss=((m.hP||50)/100)*C.ppda_proxy;
  const aPoss=((m.aP||50)/100)*C.ppda_proxy;

  // -- C: Set piece e disciplinare
  const hSet=(m.hPen||0)*C.penalty+(m.aFouls||0)*C.foul_off+(m.hFK||0)*C.freekick_box;
  const aSet=(m.aPen||0)*C.penalty+(m.hFouls||0)*C.foul_off+(m.aFK||0)*C.freekick_box;

  // -- Rosso, Momentum, CS rate
  const hRedMult=m.aRed?C.red_mult:1.0;
  const aRedMult=m.hRed?C.red_mult:1.0;
  const hMom=momentumBoost(m,'h'), aMom=momentumBoost(m,'a');
  const hCS=csRateMult(m.home,m.away), aCS=csRateMult(m.away,m.home);

  // -- Fergie Time + xScores last-15 (OptaAnalyst . xScores)
  const fergie=min>=C.fergie_min?C.fergie_mult:1.0;
  const last15=min>=C.last15_min?C.last15_mult:1.0;
  const timeMult=fergie*last15;

  // -- Dixon-Coles + Maher: modello strutturale
  //    Calibrato: bet365 . Snai . Betfair . BetPractice . 1x2Stats
  //    Dati storici: OpenFootball 2025/26 + StatisticheCalcio
  const avg=C.league_avg[m.league]||C.league_avg.other;

  // Understat/FBref xgF prior come anchor pre-partita
  const hXgPrior=xgFPrior(m.home), aXgPrior=xgFPrior(m.away);
  const hMod=(hT.atk*aT.def*avg*C.home_adv*formBonus(m.home)*ciesBoost(m.home)
             +hXgPrior*0.15)/1.15; // blend con prior storico xgF
  const aMod=(aT.atk*hT.def*avg*formBonus(m.away)*ciesBoost(m.away)
             +aXgPrior*0.15)/1.15;

  // -- Transfermarkt: valore mercato -> bonus offensivo
  const hTMV=tmvBonus(m.home), aTMV=tmvBonus(m.away);

  // -- Blend dinamico: piu minuti -> piu peso stats live
  const w=Math.min(min/45,1.0);
  const blend=Math.min(min/28,1.0);
  const hStat=(hShot+hPress+hPoss+hSet)*w*hMom*hCS;
  const aStat=(aShot+aPress+aPoss+aSet)*w*aMom*aCS;
  const hRaw=(hStat*(0.42+0.18*blend)+hMod*hTMV*(0.58-0.18*blend))*hRedMult*timeMult;
  const aRaw=(aStat*(0.42+0.18*blend)+aMod*aTMV*(0.58-0.18*blend))*aRedMult*timeMult;

  return{h:Math.min(hRaw,5.5).toFixed(2),a:Math.min(aRaw,5.5).toFixed(2),hR:Math.min(hRaw,5.5),aR:Math.min(aRaw,5.5)};
}

function goalProb(m,xg,isHT){
  const halfDur=isHT?45:90;
  const rem=Math.max(halfDur-m.min,1);
  const rate=(parseFloat(xg.h)+parseFloat(xg.a))/Math.max(m.min,1);
  const lam=rate*Math.min(15,rem);
  return Math.min((1-Math.exp(-lam))*100,99);
}

function scorerProb(m,xg,side){
  const name=side==='h'?m.home:m.away;
  const t=td(name);
  const xgV=parseFloat(side==='h'?xg.h:xg.a);
  const rate=xgV/Math.max(m.min,1)*15;
  const rb=t.rank<=3?1.15:t.rank<=6?1.0:0.88;
  return Math.min((1-Math.exp(-rate*rb*formBonus(name)))*100,99);
}

// ======================================================================
//  MOTORE QUOTE LIVE - Calcolate in tempo reale dal modello xG
//  Simula Bet365 / Snai / Unibet usando Dixon-Coles + Poisson bivariato
//  Aggiornate ogni 15s insieme ai dati live - NESSUNA API esterna
// ======================================================================

function calcLiveOdds(m) {
  // Calcola xG corrente
  const xg = calcXG(m);
  const hxg = parseFloat(xg.h);
  const axg = parseFloat(xg.a);
  const min = Math.max(m.min, 1);

  // Minuti rimanenti nella partita (90 o 45 se primo tempo)
  const isHalf = min <= 45;
  const fullRem = Math.max(90 - min, 1);

  // Proiezione xG finale usando tasso corrente
  const rate = (hxg + axg) / min;
  const hProj = hxg + (rate * (parseFloat(xg.h) / (hxg + axg + 0.001))) * fullRem;
  const aProj = axg + (rate * (parseFloat(xg.a) / (hxg + axg + 0.001))) * fullRem;

  // xG aggiustato per gol gia segnati
  const hFinal = Math.max(hProj * 0.55 + m.hS * 0.18, 0.05);
  const aFinal = Math.max(aProj * 0.55 + m.aS * 0.18, 0.05);

  // Poisson bivariato per 1X2 sul risultato FINALE
  function pp(l, k) {
    if (k < 0) return 0;
    let p = Math.exp(-l);
    for (let i = 0; i < k; i++) p *= l / (i + 1);
    return p;
  }

  // Considera gol gia fatti: calcola prob di aggiungere altri gol
  let hw = 0, dr = 0, aw = 0;
  for (let g1 = 0; g1 <= 8; g1++) {
    for (let g2 = 0; g2 <= 8; g2++) {
      const p = pp(hFinal, g1) * pp(aFinal, g2);
      const tot1 = m.hS + g1;
      const tot2 = m.aS + g2;
      if (tot1 > tot2) hw += p;
      else if (tot1 === tot2) dr += p;
      else aw += p;
    }
  }
  const tot = hw + dr + aw;
  hw /= tot; dr /= tot; aw /= tot;

  // OVER/UNDER 2.5 sul totale gol finali
  const totGoals = m.hS + m.aS;
  let over25 = 0;
  if (totGoals >= 3) {
    over25 = 0.97; // gia over
  } else {
    const need = 3 - totGoals;
    const lam = hFinal + aFinal;
    over25 = 1 - pp(lam, 0) - (need > 1 ? pp(lam, 1) : 0) - (need > 2 ? pp(lam, 2) : 0);
    over25 = Math.max(0.03, Math.min(0.97, over25));
  }
  const under25 = 1 - over25;

  // GG (entrambe segnano)
  const hScores = totGoals > 0 ? 1 : (1 - Math.exp(-hFinal));
  const aScores = (m.aS > 0 || totGoals > 0 && m.hS === totGoals) ? 1 : (1 - Math.exp(-aFinal));
  const gg = Math.max(0.03, Math.min(0.97,
    (m.hS > 0 ? 1 : (1 - Math.exp(-hFinal))) *
    (m.aS > 0 ? 1 : (1 - Math.exp(-aFinal)))
  ));

  // Converti prob -> quota decimale con margine bookmaker (5%)
  const margin = 0.05;
  function toOdds(p) {
    const fair = Math.max(0.03, Math.min(0.97, p));
    return Math.max(1.01, +(1 / (fair + margin * fair)).toFixed(2));
  }

  // Quota prossimo gol (chi segna adesso)
  const hspeed = hxg / Math.max(min, 1);
  const aspeed = axg / Math.max(min, 1);
  const totSpeed = hspeed + aspeed + 0.001;
  const hNextPct = Math.round(hspeed / totSpeed * 100);
  const aNextPct = 100 - hNextPct;

  return {
    h1: toOdds(hw),
    x:  toOdds(dr),
    h2: toOdds(aw),
    over25: toOdds(over25),
    under25: toOdds(under25),
    gg: toOdds(gg),
    nogg: toOdds(1 - gg),
    hNextPct,
    aNextPct,
    hWinPct: Math.round(hw * 100),
    drawPct: Math.round(dr * 100),
    aWinPct: Math.round(aw * 100),
    over25Pct: Math.round(over25 * 100),
    lastUpdate: new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
  };
}

// -- Calcola attaccante piu pericoloso da segnare
function bestAttackerScorer(teamName, xgTeam){
  const t = td(teamName);
  const xgV = parseFloat(xgTeam)||1.2;
  const xgBoost = Math.min(xgV/1.2, 2.0);
  // Cerca in TEAM_DB i dati attaccante
  const players = [
    {name:'Attaccante '+teamName, pos:'CF', goals:Math.round(xgV*12), pct:0}
  ];
  // Usa i dati del team per stimare probabilità attaccante
  const basePct = Math.round(Math.min((t.atk*0.45 + xgV*0.28)*100 * xgBoost, 65));
  return {
    name: getTopStriker(teamName),
    pos: 'CF/ST',
    goals: Math.round(xgV*10),
    pct: Math.max(basePct, 12)
  };
}

// -- Calcola difensore piu pericoloso da segnare per una squadra
// Formula: score = (xg90*40) + (goals*8) + (sp*5) + (head*3) + (form*4) + altezza_bonus
// Fonti: FBref xG/90, WhoScored set piece, Wikipedia altezza, Understat gol
function bestDefenderScorer(teamName, xgTeam){
  const defenders = DEFENDER_DB[teamName];
  const xgBoost = Math.min(parseFloat(xgTeam)||1.2, 3.0)/1.5; // xG alto = piu cross/corner = piu chance difensore

  if(!defenders || defenders.length===0){
    // Fallback generico se squadra non in DB
    const t = td(teamName);
    return {
      name: 'Difensore ' + teamName,
      pos: 'CB',
      pct: Math.round(Math.min((t.atk*0.18 + (parseFloat(xgTeam)||1)*0.15)*100, 32)),
      h: 185,
      goals: 1,
      sp: 6,
    };
  }

  // Calcola score per ogni difensore
  const scored = defenders.map(d => {
    const hBonus = Math.max(0, (d.h - 175)) * 0.15; // ogni cm sopra 175 vale 0.15
    const score = d.xg90*40 + d.goals*8 + d.sp*5 + d.head*3 + d.form*4 + hBonus;
    const adjScore = score * xgBoost;
    return {...d, score: adjScore};
  });

  // Ordina per score decrescente
  scored.sort((a,b) => b.score - a.score);
  const best = scored[0];

  // Converti score in probabilita % (max ~35% per difensore elite)
  const pct = Math.round(Math.min(best.score * 0.9, 35));

  return {
    name: best.name,
    pos: best.pos,
    pct: Math.max(pct, 5),
    h: best.h,
    goals: best.goals,
    sp: best.sp,
    head: best.head,
  };
}

function bestMidfielderScorer(teamName, xgTeam){
  const midfielders = MIDFIELDER_DB[teamName];
  const xgBoost = Math.min(parseFloat(xgTeam)||1.2, 3.0)/1.5;

  if(!midfielders || midfielders.length===0){
    const t = td(teamName);
    return {
      name: 'Centrocampista ' + teamName,
      pos: 'CM',
      pct: Math.round(Math.min((t.atk*0.22 + (parseFloat(xgTeam)||1)*0.18)*100, 40)),
      goals: 2,
      sp: 6,
      long: 6,
    };
  }

  const scored = midfielders.map(m => {
    const score = m.xg90*50 + m.goals*9 + m.sp*4 + m.long*3 + m.form*5;
    return {...m, score: score * xgBoost};
  });

  scored.sort((a,b) => b.score - a.score);
  const best = scored[0];

  const pct = Math.round(Math.min(best.score * 0.75, 42));

  return {
    name: best.name,
    pos: best.pos,
    pct: Math.max(pct, 8),
    goals: best.goals,
    sp: best.sp,
    long: best.long,
  };
}

function predictMatch(fix){
  const hT=td(fix.home),aT=td(fix.away);
  const avg={ucl:1.40,epl:1.35,serie_a:1.25,la_liga:1.30,bundesliga:1.45,ligue_1:1.28}[fix.league]||1.30;
  const hxg=+(hT.atk*aT.def*avg*1.12*formBonus(fix.home)).toFixed(2);
  const axg=+(aT.atk*hT.def*avg*formBonus(fix.away)).toFixed(2);
  function pp(l,k){let p=Math.exp(-l);for(let i=0;i<k;i++)p*=l/(i+1);return p;}
  let hw=0,dr=0,aw=0;
  for(let g1=0;g1<=6;g1++)for(let g2=0;g2<=6;g2++){
    const p=pp(hxg,g1)*pp(axg,g2);
    if(g1>g2)hw+=p;else if(g1===g2)dr+=p;else aw+=p;
  }
  const tot=hw+dr+aw;
  const btts=(1-Math.exp(-hxg))*(1-Math.exp(-axg));
  const o25=1-pp(hxg+axg,0)-pp(hxg+axg,1)-pp(hxg+axg,2);
  return{hxg,axg,hWin:Math.round(hw/tot*100),draw:Math.round(dr/tot*100),aWin:Math.round(aw/tot*100),
    goals:+(hxg+axg).toFixed(1),btts:Math.round(btts*100),over25:Math.round(o25*100),
    winner:hw>aw&&hw>dr?fix.home:aw>hw&&aw>dr?fix.away:"Pareggio",
    conf:Math.round(Math.max(hw,dr,aw)/tot*100)};
}

function guessLeague(n){
  if(!n)return'other';const l=n.toLowerCase();
  if(l.includes('premier'))return'epl';
  if(l.includes('serie a')&&!l.includes('bras'))return'serie_a';
  if(l.includes('la liga')||l.includes('primera division'))return'la_liga';
  if(l.includes('bundesliga'))return'bundesliga';
  if(l.includes('ligue 1'))return'ligue_1';
  if(l.includes('champions'))return'ucl';
  if(l.includes('europa league'))return'uel';
  if(l.includes('conference'))return'uecl';
  if(l.includes('eredivisie'))return'eredivisie';
  if(l.includes('primeira')||l.includes('liga portugal'))return'primeira';
  if(l.includes('super lig')||l.includes('super'))return'super_lig';
  return'other';
}

function playGolSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Crowd roar simulation with oscillators
    const notes=[523,659,784,1047,784,659,523];
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value=freq;
      osc.type='sine';
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.12);
      gain.gain.linearRampToValueAtTime(0.3,ctx.currentTime+i*0.12+0.05);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+i*0.12+0.25);
      osc.start(ctx.currentTime+i*0.12);
      osc.stop(ctx.currentTime+i*0.12+0.3);
    });
    // Bass boom
    const bass=ctx.createOscillator();
    const bassGain=ctx.createGain();
    bass.connect(bassGain); bassGain.connect(ctx.destination);
    bass.frequency.value=80; bass.type='sine';
    bassGain.gain.setValueAtTime(0.6,ctx.currentTime);
    bassGain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);
    bass.start(ctx.currentTime); bass.stop(ctx.currentTime+0.8);
  }catch(e){}
}

function checkGoals(matches){
  for(const m of matches){
    const prev = prevScores[m.id];
    if(prev){
      if(m.hS > prev.h){
        const scorer = m.lastGoalScorer || m.hScorer || null;
        showGol(m.home, m.hS, m.aS, scorer);
      } else if(m.aS > prev.a){
        const scorer = m.lastGoalScorer || m.aScorer || null;
        showGol(m.away, m.hS, m.aS, scorer);
      }
    }
    prevScores[m.id] = {h: m.hS, a: m.aS};
  }
}

async function fetchLive(){
  document.getElementById('statusDot').style.background='#38bdf8';
  document.getElementById('statusText').textContent=' Connessione api-sports.io...';
  const ht=[],ft=[];
  try{
    const r=await fetch(WORKER,{mode:'cors',credentials:'omit'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    for(const f of (d.response||[])){
      const s=f.fixture?.status?.short;
      if(!['1H','2H','ET','HT','P'].includes(s))continue;
      // Minuto corretto: 1H=1-45, HT=45, 2H=46-90, ET=91+
      let min=parseInt(f.fixture?.status?.elapsed)||0;
      if(s==='HT') min=45;
      else if(s==='2H' && min<46) min=46;
      else if(s==='1H' && min<1) min=1;
      if(min===0) min = s==='2H'?46:1;
      const lk=guessLeague(f.league?.name||'');
      if(!LEAGUES[lk])LEAGUES[lk]={name:f.league?.name||lk,flag:'🌍',color:'#94a3b8'};
      const stats=f.statistics||[];
      function sv(teamId,key){
        const t=stats.find(s=>s.team?.id===teamId);
        if(!t)return 0;
        const e=t.statistics?.find(x=>x.type===key);
        const v=e?.value;
        if(typeof v==='string'&&v.endsWith('%'))return parseFloat(v)||0;
        return parseInt(v)||0;
      }
      const hId=f.teams?.home?.id,aId=f.teams?.away?.id;
      const m={
        id:'l'+f.fixture.id,
        home:f.teams?.home?.name||'Home',away:f.teams?.away?.name||'Away',
        hS:f.goals?.home??0,aS:f.goals?.away??0,min,status:s,
        hP:sv(hId,'Ball Possession')||50,aP:sv(aId,'Ball Possession')||50,
        hSh:sv(hId,'Total Shots'),aSh:sv(aId,'Total Shots'),
        hSOT:sv(hId,'Shots on Goal'),aSOT:sv(aId,'Shots on Goal'),
        hCorn:sv(hId,'Corner Kicks'),aCorn:sv(aId,'Corner Kicks'),
        hDangAtt:sv(hId,'Dangerous Attacks')||sv(hId,'Attacks'),
        aDangAtt:sv(aId,'Dangerous Attacks')||sv(aId,'Attacks'),
        hFouls:sv(hId,'Fouls'),aFouls:sv(aId,'Fouls'),
        hRed:sv(hId,'Red Cards'),aRed:sv(aId,'Red Cards'),
        hPen:sv(hId,'Penalty'),aPen:sv(aId,'Penalty'),
        league:lk,
      };
      // HT = intervallo, 1H = primo tempo, 2H/ET = secondo tempo
      if(s==='1H'||s==='HT') ht.push(m); else ft.push(m);
    }
  }catch(e){
    document.getElementById('statusText').textContent='(!)️ '+e.message.slice(0,50);
  }
  liveHT=ht.length?ht:null;
  liveFT=ft.length?ft:null;
  hasLive=ht.length+ft.length>0;
  // GOL DETECTOR
  checkGoals([...ht,...ft]);
  if(hasLive){
    document.getElementById('statusDot').style.background='#4ade80';
    document.getElementById('statusText').textContent='[OK] '+(ht.length+ft.length)+' partite live   prossimo check 15s';
    let countdown2=15;
    if(window._countdownTimer) clearInterval(window._countdownTimer);
    window._countdownTimer=setInterval(()=>{
      countdown2--;
      if(countdown2<=0){ clearInterval(window._countdownTimer); return; }
      const el=document.getElementById('statusText');
      if(el) el.textContent='[OK] '+(ht.length+ft.length)+' partite live   '+countdown2+'s';
    },1000);
    document.getElementById('modeBadge').textContent='LIVE';
    document.getElementById('modeBadge').className='badge live';
    if(ht.length&&currentTab==='future'){setTabId('ht');}
    else if(ft.length&&!ht.length&&currentTab==='future'){setTabId('ft');}
  }else{
    document.getElementById('statusDot').style.background='#475569';
    document.getElementById('statusText').textContent='Nessuna partita live   prossimo check 15s';
    // Start countdown
    let countdown=15;
    if(window._countdownTimer) clearInterval(window._countdownTimer);
    window._countdownTimer=setInterval(()=>{
      countdown--;
      if(countdown<=0){ clearInterval(window._countdownTimer); return; }
      const el=document.getElementById('statusText');
      if(el) el.textContent='Nessuna partita live   prossimo check '+countdown+'s';
    },1000);
    document.getElementById('modeBadge').textContent='DEMO';
    document.getElementById('modeBadge').className='badge';
    setTabId('future');
  }
  buildFilters();render();
}

function setTabId(id){
  currentTab=id;
  const ids=['ht','ft','future','over25','multipla'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',ids[i]===id));
}
function setTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');render();
}
function setLeague(id){currentLeague=id;buildFilters();render();}

function buildFilters(){
  const FIXED=['all','serie_a','epl','la_liga','ligue_1','super_lig','primeira','ucl','uel','uecl'];
  const used=new Set(FIXED);
  const src=hasLive?[...(liveHT||[]),...(liveFT||[])]:getUpcoming();
  src.forEach(m=>used.add(m.league));
  const c=document.getElementById('leagueFilters');
  let html='';
  FIXED.forEach(id=>{
    if(id==='all'){
      html+=`<button class="filter-btn ${currentLeague==='all'?'active':''}" onclick="setLeague('all')">🌍 Tutti</button>`;
    } else {
      const l=LEAGUES[id]||{flag:'🌍',name:id};
      html+=`<button class="filter-btn ${currentLeague===id?'active':''}" onclick="setLeague('${id}')">${l.flag} ${l.name}</button>`;
    }
  });
  used.forEach(id=>{
    if(FIXED.includes(id)||id==='all')return;
    const l=LEAGUES[id]||{flag:'🌍',name:id};
    html+=`<button class="filter-btn ${currentLeague===id?'active':''}" onclick="setLeague('${id}')">${l.flag} ${l.name}</button>`;
  });
  c.innerHTML=html;
}

function renderMultipla(el){
  const all = getUpcoming().filter(f=>currentLeague==='all'||f.league===currentLeague);
  const scored = all.map(f=>{
    const pred = predictMatch(f);
    const lg = LEAGUES[f.league]||{flag:'?',name:f.league,color:'#7c3aed'};
    const options = [];
    // OVER 2.5
    if(pred.over25>=55) options.push({fix:f,pred,lg,type:'over25',label:'OVER 2.5',prob:pred.over25});
    // BTTS
    if(pred.btts>=55) options.push({fix:f,pred,lg,type:'btts',label:'GG',prob:pred.btts});
    // 1X2 winner se alta confidenza
    if(pred.hWin>=60) options.push({fix:f,pred,lg,type:'home',label:'1 CASA',prob:pred.hWin});
    if(pred.aWin>=60) options.push({fix:f,pred,lg,type:'away',label:'2 TRASFERTA',prob:pred.aWin});
    return options;
  }).flat().sort((a,b)=>b.prob-a.prob);

  if(!scored.length){
    el.innerHTML='<div style="text-align:center;padding:50px 20px;color:#475569"><div style="font-size:36px;margin-bottom:10px">🎰</div><div style="font-size:14px;font-weight:700">Nessuna multipla disponibile</div></div>';
    return;
  }

  // Build 3 different combinations: safe (3 picks high prob), balanced (3 picks mixed), risky (4 picks)
  const top = scored.slice(0,8);
  // Safe: top 3 by prob (no duplicates per match)
  const safe=[], seenSafe=new Set();
  for(const p of top){ if(!seenSafe.has(p.fix.id)&&safe.length<3){safe.push(p);seenSafe.add(p.fix.id);} }
  // Balanced: mix over25 + btts + 1x2
  const balanced=[], seenBal=new Set();
  for(const type of ['over25','btts','home','away']){
    const pick=top.find(p=>p.type===type&&!seenBal.has(p.fix.id));
    if(pick&&balanced.length<3){balanced.push(pick);seenBal.add(pick.fix.id);}
  }
  // Risky: top 4
  const risky=[], seenRisk=new Set();
  for(const p of scored){ if(!seenRisk.has(p.fix.id)&&risky.length<4){risky.push(p);seenRisk.add(p.fix.id);} }

  const sections = [];
  if(safe.length>=2) sections.push({title:'MULTIPLA SICURA',icon:'🛡️',color:'#4ade80',picks:safe});
  if(balanced.length>=2&&balanced.some(p=>safe.every(s=>s.fix.id!==p.fix.id||s.type!==p.type))) sections.push({title:'MULTIPLA BILANCIATA',icon:'[=]',color:'#facc15',picks:balanced});
  if(risky.length>=3) sections.push({title:'MULTIPLA AGGRESSIVA',icon:'🔥',color:'#fb923c',picks:risky});

  const srcLabel = dynamicFixtures.length>0 ? '<div style="font-size:9px;color:#38bdf8;margin-top:2px">📡 Partite reali oggi+domani</div>' : '<div style="font-size:9px;color:#475569;margin-top:2px">📋 Calendario fisso</div>';
  el.innerHTML='<div class="section-header">'
    +'<span style="font-size:20px">🎰</span>'
    +'<div>'
    +'<div style="font-family:Oswald,sans-serif;font-size:14px;font-weight:700;color:#a78bfa">MIGLIORE MULTIPLA</div>'
    +'<div style="font-size:10px;color:#475569">Selezioni ottimali combinate   xG FUSION 51 fonti</div>'
    +srcLabel
    +'</div>'
    +'</div>'
    +sections.map(s=>'<div style="margin-bottom:6px;padding:6px 10px 0;border-left:3px solid '+s.color+'">'
      +'<div style="font-family:Oswald,sans-serif;font-size:10px;font-weight:800;color:'+s.color+';letter-spacing:2px;margin-bottom:6px">'+s.icon+' '+s.title+'</div>'
      +'</div>'
      +multiplaCard(s.picks)).join('');
}



// ── MINI GRAFICO xG EVOLUTION (SVG sparkline simulato da stats live) ─────────
function buildXgChartSVG(m, xg, lgColor){
  // Genera punti xG simulati ogni 15 minuti fino al minuto corrente
  const min = m.min||45;
  const hxg = parseFloat(xg.h)||0;
  const axg = parseFloat(xg.a)||0;
  const steps = Math.max(3, Math.ceil(min/15));
  const W=240, H=50, pad=8;
  const chartW = W - pad*2;
  const chartH = H - pad*2;
  
  // Build xG curve points (progressive, with some variance)
  const hPts=[], aPts=[];
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    // Simulate progressive xG with slight acceleration in second half
    const curve = t<0.5 ? t*0.85 : 0.425+((t-0.5)*1.15);
    const corner_boost = (m.hCorn||0)*0.03;
    const corner_boostA = (m.aCorn||0)*0.03;
    hPts.push(hxg * curve * (1 + corner_boost*(i%2===0?0.1:0)));
    aPts.push(axg * curve * (1 + corner_boostA*(i%2===1?0.1:0)));
  }
  
  const maxXg = Math.max(...hPts, ...aPts, 0.5) * 1.15;
  
  function toX(i){ return pad + (i/steps)*chartW; }
  function toY(v){ return H - pad - (v/maxXg)*chartH; }
  
  const hPath = hPts.map((v,i)=>(i===0?'M':'L')+toX(i).toFixed(1)+','+toY(v).toFixed(1)).join(' ');
  const aPath = aPts.map((v,i)=>(i===0?'M':'L')+toX(i).toFixed(1)+','+toY(v).toFixed(1)).join(' ');
  
  // Area fills
  const hArea = hPath + ' L'+toX(steps).toFixed(1)+','+H+' L'+pad+','+H+' Z';
  const aArea = aPath + ' L'+toX(steps).toFixed(1)+','+H+' L'+pad+','+H+' Z';
  
  // Score events (simulate gol at random minutes)
  const hGoalPts = m.hS>0 ? [Math.round(min*0.6)] : [];
  const aGoalPts = m.aS>0 ? [Math.round(min*0.55)] : [];
  
  const goalDots = [
    ...hGoalPts.map(gm=>{ const gi=Math.round((gm/min)*steps); const gx=toX(gi); const gy=toY(hPts[gi]||0); return '<circle cx="'+gx.toFixed(1)+'" cy="'+gy.toFixed(1)+'" r="4" fill="'+lgColor+'" stroke="#0a0e1a" stroke-width="1.5"/>'; }),
    ...aGoalPts.map(gm=>{ const gi=Math.round((gm/min)*steps); const gx=toX(gi); const gy=toY(aPts[gi]||0); return '<circle cx="'+gx.toFixed(1)+'" cy="'+gy.toFixed(1)+'" r="4" fill="#38bdf8" stroke="#0a0e1a" stroke-width="1.5"/>'; })
  ].join('');
  
  // Labels at end
  const hLabelX = (W-pad+2).toFixed(1);
  const aLabelX = (W-pad+2).toFixed(1);
  const hLabelY = toY(hxg).toFixed(1);
  const aLabelY = (toY(axg)+12).toFixed(1);
  
  return '<div class="xg-chart">'
    +'<div style="font-size:7px;color:#475569;font-weight:700;letter-spacing:1px;margin-bottom:4px">📈 ANDAMENTO xG (simulato)</div>'
    +'<svg width="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="display:block">'
    // Grid line at 50% minute
    +'<line x1="'+toX(Math.floor(steps/2)).toFixed(1)+'" y1="'+pad+'" x2="'+toX(Math.floor(steps/2)).toFixed(1)+'" y2="'+(H-pad)+'" stroke="#1e293b" stroke-width="1" stroke-dasharray="2,2"/>'
    // Area fills (transparent)
    +'<path d="'+hArea+'" fill="'+lgColor+'" opacity="0.08"/>'
    +'<path d="'+aArea+'" fill="#38bdf8" opacity="0.08"/>'
    // Lines
    +'<path d="'+hPath+'" fill="none" stroke="'+lgColor+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<path d="'+aPath+'" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    // Goal dots
    +goalDots
    // End labels
    +'<text x="'+hLabelX+'" y="'+hLabelY+'" fill="'+lgColor+'" font-size="8" font-weight="800" font-family="Oswald">'+xg.h+'</text>'
    +'<text x="'+hLabelX+'" y="'+aLabelY+'" fill="#38bdf8" font-size="8" font-weight="800" font-family="Oswald">'+xg.a+'</text>'
    +'</svg>'
    +'<div style="display:flex;gap:10px;margin-top:3px">'
    +'<span style="font-size:7px;color:'+lgColor+'">&#9644; '+m.home+'</span>'
    +'<span style="font-size:7px;color:#38bdf8">&#9644; '+m.away+'</span>'
    +'</div>'
    +'</div>';
}

    renderMultipla(el);

  }

  // LIVE TABS
  if(!hasLive){
    el.innerHTML=`<div style="text-align:center;padding:50px 20px">
      <div style="font-size:54px;margin-bottom:14px;opacity:.25">📡</div>
      <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:900;color:#334155;margin-bottom:8px">NESSUNA PARTITA IN CORSO</div>
      <div style="font-size:12px;color:#475569;margin-bottom:22px">Aggiornamento automatico ogni 15 secondi</div>
      <button onclick="setTabId('future');render();" class="ai-btn" style="font-size:13px;padding:10px 22px">🔮 Vedi prossime partite</button>
    </div>`;
    return;
  }
  const isHT=currentTab==='ht';
  const src=(isHT?(liveHT||[]):(liveFT||[])).filter(m=>currentLeague==='all'||m.league===currentLeague);
  if(!src.length){
    el.innerHTML=`<div style="text-align:center;padding:40px 20px;color:#475569">
      <div style="font-size:36px;margin-bottom:10px">🔍</div>
      <div style="font-size:14px;font-weight:700">Nessuna partita nel ${isHT?'primo':'secondo'} tempo</div>
    </div>`;
    return;
  }
  const sorted=src
    .map(m=>{const xg=calcXG(m);return{m,prob:goalProb(m,xg,isHT)};})
    .sort((a,b)=>b.prob-a.prob);
  el.innerHTML=sorted.map(({m})=>matchCard(m,isHT)).join('');
}

function openAI(){
  document.getElementById('aiModal').style.display='flex';
  document.getElementById('aiContent').innerHTML='<span class="spinner"></span><span style="margin-left:8px;color:#475569">Analisi xG avanzata...</span>';
  const src=hasLive?[...(liveHT||[]),...(liveFT||[])].slice(0,6):[...SEED_HT,...SEED_FT].slice(0,6);
  const lines=src.map(m=>{
    const xg=calcXG(m);
    const prob=goalProb(m,xg,m.min<=44).toFixed(0);
    const hSP=scorerProb(m,xg,'h').toFixed(0),aSP=scorerProb(m,xg,'a').toFixed(0);
    return `${m.home} vs ${m.away} | ${m.min}' | xG ${xg.h}&ndash;${xg.a} | prob gol ${prob}% | corner ${m.hCorn||0}&ndash;${m.aCorn||0} | att.peric ${m.hDangAtt||0}&ndash;${m.aDangAtt||0} | rossi ${m.hRed||0}&ndash;${m.aRed||0} | chi segna: ${m.home} ${hSP}% / ${m.away} ${aSP}%`;
  }).join('\n');
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:450,
      messages:[{role:'user',content:`Sei un analista calcistico esperto. Dati live (xG calcolato con 51 fonti: StatsBomb, Opta, Understat, FBref, WhoScored, SFStats, Sofascore, Fotmob, Overlyzer, Wyscout, ScoreTrend, Flashscore, Diretta.it, bet365, Snai, Betfair, BetPractice, 1x2Stats, OpenFootball, Transfermarkt, CIES, StatisticheCalcio, Livescore, xScores, Soccerway, OptaAnalyst, The Athletic, Dixon-Coles, Maher):\n${lines}\n\nDai 4 previsioni brevi e sicure di gol imminente. Formato:\n🎯 [Partita]: [squadra] segnera &mdash; [motivo 1 riga: xG alto / corner / uomo in piu / forma]. Max 160 parole totali.`}]
    })
  })
  .then(r=>r.json())
  .then(d=>{
    const t=d.content?.[0]?.text||'Nessuna previsione.';
    document.getElementById('aiContent').innerHTML=`<p style="font-size:13px;line-height:1.9;color:#cbd5e1;white-space:pre-line">${t}</p>`;
  })
  .catch(e=>{document.getElementById('aiContent').innerHTML=`<p style="color:#f87171">Errore: ${e.message}</p>`;});
}
function closeAI(){document.getElementById('aiModal').style.display='none';}


async function fetchFixtures(){
  try{
    const r=await fetch(WORKER+'?type=fixtures',{mode:'cors',credentials:'omit'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    const arr=d.response||[];
    if(arr.length>0){
      dynamicFixtures=arr.map(function(f){
        var lk=guessLeague(f.league?.name||'');
        if(!LEAGUES[lk]) LEAGUES[lk]={name:f.league?.name||lk,flag:'🌍',color:'#94a3b8'};
        return {
          id:'dyn_'+f.fixture.id,
          home:f.teams.home.name,
          away:f.teams.away.name,
          kickoff:f.fixture.date||new Date().toISOString(),
          league:lk
        };
      });
      buildFilters();
      if(currentTab==='future'||currentTab==='over25'||currentTab==='multipla') render();
    }
  }catch(e){ console.warn('fixtures err',e); }
}

function getUpcoming(){
  if(dynamicFixtures.length>0) return dynamicFixtures;
  return UPCOMING;
}

async function fetchOdds(){
  var now=Date.now();
  if(now-lastOddsFetch < 120000) return; // max ogni 2 minuti
  lastOddsFetch=now;
  try{
    var r=await fetch(WORKER+'?type=odds',{mode:'cors',credentials:'omit'});
    if(!r.ok) return;
    var d=await r.json();
    if(d.odds && d.count>0){
      oddsCache=d.odds;
      if(currentTab==='ht'||currentTab==='ft') render();
    }
  }catch(e){ console.warn('odds err',e); }
}

function getOddsForMatch(home, away){
  var k1=(home||'').toLowerCase().replace(/[^a-z0-9]/g,'')+'_'+(away||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  if(oddsCache[k1]) return oddsCache[k1].odds;
  // cerca match parziale
  var keys=Object.keys(oddsCache);
  for(var i=0;i<keys.length;i++){
    var parts=keys[i].split('_');
    var h=parts[0], a=parts[1];
    if(h&&a&&k1.includes(h.slice(0,5))&&k1.includes(a.slice(0,5))) return oddsCache[keys[i]].odds;
  }
  return null;
}

buildFilters();render();fetchLive();fetchFixtures();fetchOdds();
setInterval(()=>{ if(!document.hidden) fetchLive(); }, 15000);
setInterval(()=>{ fetchFixtures(); }, 300000);
setInterval(()=>{ fetchOdds(); }, 120000);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ fetchLive(); fetchOdds(); } });
</script>
