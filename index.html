function td(name){return TEAM_DB[name]||{rank:10,gf:32,ga:33,form:7,atk:1.0,def:1.0};}
function formBonus(name){const t=td(name);return 1+(t.form-7.5)/7.5*0.15;}

function calcXG(m){
  const hRaw=m.hSOT*0.30+(m.hSh-m.hSOT)*0.04+(m.hP/100)*0.5;
  const aRaw=m.aSOT*0.30+(m.aSh-m.aSOT)*0.04+(m.aP/100)*0.5;
  const hT=td(m.home),aT=td(m.away);
  const hM=hT.atk*aT.def*1.325*1.08,aM=aT.atk*hT.def*1.325;
  const w=Math.min(m.min/45,1);
  const fH=formBonus(m.home),fA=formBonus(m.away);
  const h=Math.min((hRaw*w*0.6+hM*0.4)*fH,4.5);
  const a=Math.min((aRaw*w*0.6+aM*0.4)*fA,4.5);
  return{h:h.toFixed(2),a:a.toFixed(2),hRaw:h,aRaw:a};
}

function goalProb(m,xg,isHT){
  const tot=isHT?45:90,rem=Math.max(tot-m.min,1),used=Math.max(m.min,1);
  const rate=(parseFloat(xg.h)+parseFloat(xg.a))/used;
  const λ=rate*Math.min(15,rem);
  return Math.min((1-Math.exp(-λ))*100,99);
}

function scorerProb(m,xg,side){
  const name=side==='h'?m.home:m.away;
  const t=td(name);
  const xgVal=parseFloat(side==='h'?xg.h:xg.a);
  const used=Math.max(m.min,1);
  const pace=xgVal/used*15;
  const rankBoost=t.rank<=4?1.12:t.rank<=8?1.0:0.90;
  const λ=pace*rankBoost*formBonus(name);
  return Math.min((1-Math.exp(-λ))*100,99);
}

function predictMatch(fix){
  const hT=td(fix.home),aT=td(fix.away);
  const avg={ucl:1.40,epl:1.35,serie_a:1.25,la_liga:1.30,bundesliga:1.45,ligue_1:1.28}[fix.league]||1.30;
  const hxg=+(hT.atk*aT.def*avg*1.12*formBonus(fix.home)).toFixed(2);
  const axg=+(aT.atk*hT.def*avg*formBonus(fix.away)).toFixed(2);
  function pp(λ,k){let p=Math.exp(-λ);for(let i=0;i<k;i++)p*=λ/(i+1);return p;}
  let hw=0,dr=0,aw=0;
  for(let g1=0;g1<=6;g1++)for(let g2=0;g2<=6;g2++){
    const p=pp(hxg,g1)*pp(axg,g2);
    if(g1>g2)hw+=p;else if(g1===g2)dr+=p;else aw+=p;
  }
  const tot=hw+dr+aw;
  const btts=(1-Math.exp(-hxg))*(1-Math.exp(-axg));
  const o25=1-pp(hxg+axg,0)-pp(hxg+axg,1)-pp(hxg+axg,2);
  return{
    hxg,axg,
    hWin:Math.round(hw/tot*100),draw:Math.round(dr/tot*100),aWin:Math.round(aw/tot*100),
    goals:+(hxg+axg).toFixed(1),
    btts:Math.round(btts*100),over25:Math.round(o25*100),
    winner:hw>aw&&hw>dr?fix.home:aw>hw&&aw>dr?fix.away:"Pareggio",
    conf:Math.round(Math.max(hw,dr,aw)/tot*100),
  };
}

  if(n.includes('serie a')&&!n.includes('bras'))return'serie_a';
  if(n.includes('la liga')||n.includes('primera division'))return'la_liga';
  if(n.includes('bundesliga'))return'bundesliga';
  if(n.includes('ligue 1'))return'ligue_1';
  if(n.includes('champions'))return'ucl';
  if(n.includes('europa league'))return'uel';
  if(n.includes('conference'))return'uecl';
  if(n.includes('eredivisie'))return'eredivisie';
  if(n.includes('primeira')||n.includes('liga portugal'))return'primeira';
  if(n.includes('super lig')||n.includes('süper'))return'super_lig';
  return'other';
}

async function fetchLive(){
  document.getElementById('statusDot').style.background='#38bdf8';
  document.getElementById('statusText').textContent='⏳ Carico partite live…';
  const ht=[],ft=[];
  try{
    const r=await fetch('https://still-term-cd49.marcocuscito81.workers.dev/',{mode:'cors',credentials:'omit'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    (d.response||[]).forEach((f,i)=>{
      const s=f.fixture?.status?.short;
      if(!['1H','2H','ET','HT','P'].includes(s))return;
      const min=parseInt(f.fixture?.status?.elapsed)||45;
      const lk=guessLeague(f.league?.name||'');
      if(!LEAGUES[lk])LEAGUES[lk]={name:f.league?.name||lk,flag:'🌍',color:'#94a3b8'};
      const m={id:'l'+i,home:f.teams?.home?.name||'Home',away:f.teams?.away?.name||'Away',
        hS:f.goals?.home??0,aS:f.goals?.away??0,min,hP:50,aP:50,hSh:0,aSh:0,hSOT:0,aSOT:0,league:lk};
      if(min<=44)ht.push(m);else ft.push(m);
    });
  }catch(e){
    document.getElementById('statusText').textContent='⚠️ '+e.message.slice(0,50);
  }
  liveHT=ht.length?ht:null;
  liveFT=ft.length?ft:null;
  const total=ht.length+ft.length;
  if(total>0){
    document.getElementById('statusDot').style.background='#4ade80';
    document.getElementById('statusText').textContent='✅ '+total+' partite live · api-sports.io';
    document.getElementById('modeBadge').textContent='LIVE';
    document.getElementById('modeBadge').className='badge live';
  }else{
    document.getElementById('statusDot').style.background='#475569';
    document.getElementById('statusText').textContent='🔎 Nessuna partita in corso ora';
  }
  buildFilters();render();
}

function buildFilters(){
  const used=new Set(['all']);
  [...(liveHT||SEED_HT),...(liveFT||SEED_FT),...UPCOMING].forEach(m=>used.add(m.league));
  const c=document.getElementById('leagueFilters');
  c.innerHTML='<button class="filter-btn '+(currentLeague==='all'?'active':'')+'" onclick="setLeague(\'all\')">🌍 Tutti</button>';
  used.forEach(id=>{
    if(id==='all')return;
    const l=LEAGUES[id]||{flag:'🌍',name:id};
    c.innerHTML+=`<button class="filter-btn ${currentLeague===id?'active':''}" onclick="setLeague('${id}')">${l.flag} ${l.name}</button>`;
  });
}

function setLeague(id){currentLeague=id;buildFilters();render();}
function setTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');render();
}

function matchCard(m,isHT){
  const xg=calcXG(m);
  const prob=goalProb(m,xg,isHT);
  const lg=LEAGUES[m.league]||{flag:'🌍',name:m.league,color:'#7c3aed'};
  const hT=td(m.home),aT=td(m.away);
  const tot=parseFloat(xg.h)+parseFloat(xg.a)||1;
  const hPct=Math.round(parseFloat(xg.h)/tot*100);
  const isHot=prob>=70;
  const isWarm=prob>=50&&prob<70;
  const probColor=prob>=75?'#4ade80':prob>=50?'#facc15':prob>=30?'#94a3b8':'#f87171';
  // Scorer probabilities
  const hScore=scorerProb(m,xg,'h');
  const aScore=scorerProb(m,xg,'a');
  const scoreTot=hScore+aScore||1;
  const hScorePct=Math.round(hScore/scoreTot*100);
  const aScorePct=100-hScorePct;

  return `
  <div class="card ${isHot?'hot':isWarm?'warn':''}">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:14px">${lg.flag}</span>
        <span class="league-badge">${lg.name}</span>
        <span class="live-badge">
          <span class="live-dot"></span>${isHT?'1°T':'2°T'} ${m.min}'
        </span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:9px;color:#475569;font-weight:600">${isHot?'⚡ PERICOLO':''}${isWarm?'🟡 ATTENZIONE':''}</span>
        <span style="font-size:26px;font-weight:900;font-family:'Oswald',sans-serif;color:${probColor};text-shadow:0 0 15px ${probColor}66">${Math.round(prob)}%</span>
      </div>
    </div>
    <div class="card-body">
      <div class="teams">
        <div class="team-block">
          <div class="team-name">${m.home}</div>
          <div class="team-sub">#${hT.rank} · Forma ${hT.form}/15</div>
        </div>
        <div class="score">${m.hS}:${m.aS}</div>
        <div class="team-block" style="text-align:right">
          <div class="team-name">${m.away}</div>
          <div class="team-sub" style="text-align:right">#${aT.rank} · Forma ${aT.form}/15</div>
        </div>
      </div>
      <div class="xg-row">
        <div class="xg-box ${parseFloat(xg.h)>=parseFloat(xg.a)?'best':''}">
          <div class="xg-val" style="color:${lg.color}">${xg.h}</div>
          <div class="xg-label">xG CASA</div>
        </div>
        <div class="xg-box">
          <div class="xg-val" style="color:${probColor}">${Math.round(prob)}%</div>
          <div class="xg-label">GOL PROB.</div>
        </div>
        <div class="xg-box ${parseFloat(xg.a)>parseFloat(xg.h)?'best':''}">
          <div class="xg-val" style="color:#38bdf8">${xg.a}</div>
          <div class="xg-label">xG TRASFERTA</div>
        </div>
      </div>
      <div class="bar-container">
        <div class="bar-label">DOMINIO xG</div>
        <div class="bar">
          <div class="bar-h" style="width:${hPct}%;background:${lg.color}"></div>
          <div class="bar-a" style="width:${100-hPct}%;background:#38bdf8"></div>
        </div>
      </div>
      <div class="scorer-section">
        <div class="scorer-title">🎯 CHI SEGNA IL PROSSIMO GOL?</div>
        <div class="scorer-row">
          <div style="min-width:90px">
            <div class="scorer-name">${m.home}</div>
            <div class="scorer-team" style="color:${lg.color}">${hT.form>=11?'🔥 In forma':'📊 Media'}</div>
          </div>
          <div class="scorer-bar-wrap">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:9px;color:#475569">Prob. gol (15min)</span>
              <span class="scorer-pct" style="color:${lg.color}">${hScorePct}%</span>
            </div>
            <div class="scorer-bar">
              <div class="scorer-bar-fill" style="width:${hScorePct}%;background:${lg.color}"></div>
            </div>
          </div>
        </div>
        <div class="scorer-row">
          <div style="min-width:90px">
            <div class="scorer-name">${m.away}</div>
            <div class="scorer-team" style="color:#38bdf8">${aT.form>=11?'🔥 In forma':'📊 Media'}</div>
          </div>
          <div class="scorer-bar-wrap">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:9px;color:#475569">Prob. gol (15min)</span>
              <span class="scorer-pct" style="color:#38bdf8">${aScorePct}%</span>
            </div>
            <div class="scorer-bar">
              <div class="scorer-bar-fill" style="width:${aScorePct}%;background:#38bdf8"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function futureCard(fix){
  const pred=predictMatch(fix);
  const lg=LEAGUES[fix.league]||{flag:'🌍',name:fix.league,color:'#7c3aed'};
  const ko=new Date(fix.kickoff);
  const h=Math.round((ko-Date.now())/3600000);
  const dateStr=ko.toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});
  const timeStr=ko.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  const hT=td(fix.home),aT=td(fix.away);
  const confColor=pred.conf>=60?'#4ade80':pred.conf>=45?'#facc15':'#94a3b8';
  return `
  <div class="card future-card">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        <span style="font-size:14px">${lg.flag}</span>
        <span class="league-badge">${lg.name}</span>
        <span style="font-size:9px;font-weight:700;background:#0a0e1a;color:#475569;padding:1px 8px;border-radius:20px;border:1px solid #1e293b">📅 ${dateStr} ${timeStr}</span>
        ${h>=0&&h<24?`<span style="font-size:9px;font-weight:800;background:#422006;color:#fb923c;padding:1px 7px;border-radius:20px;border:1px solid #fb923c44">🔥 ${h}h</span>`:''}
      </div>
      <span style="font-size:11px;font-weight:700;color:${confColor}">🎯 ${pred.conf}%</span>
    </div>
    <div class="card-body">
      <div class="teams" style="margin-bottom:10px">
        <div>
          <div class="team-name" style="color:${pred.winner===fix.home?lg.color:'#f1f5f9'}">${fix.home} ${pred.winner===fix.home?'🏆':''}</div>
          <div class="team-sub">#${hT.rank} · Forma ${hT.form}/15</div>
        </div>
        <div style="text-align:center;flex-shrink:0">
          <div style="font-size:10px;font-weight:900;color:#475569;margin-bottom:4px">VS</div>
          <div class="winner">${pred.winner}</div>
        </div>
        <div style="text-align:right">
          <div class="team-name" style="color:${pred.winner===fix.away?'#38bdf8':'#f1f5f9'}">${pred.winner===fix.away?'🏆':''} ${fix.away}</div>
          <div class="team-sub" style="text-align:right">#${aT.rank} · Forma ${aT.form}/15</div>
        </div>
      </div>
      <div class="prob-bar-wrap">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:10px;font-weight:700;color:${lg.color}">${pred.hWin}%</span>
          <span style="font-size:10px;color:#475569">X ${pred.draw}%</span>
          <span style="font-size:10px;font-weight:700;color:#38bdf8">${pred.aWin}%</span>
        </div>
        <div class="prob-bar">
          <div style="width:${pred.hWin}%;background:${lg.color};border-radius:5px 0 0 5px"></div>
          <div style="width:${pred.draw}%;background:#334155"></div>
          <div style="flex:1;background:#38bdf8;border-radius:0 5px 5px 0"></div>
        </div>
      </div>
      <div class="odds-row">
        <div class="odd-box"><div class="odd-val" style="color:${lg.color}">${pred.hxg}</div><div class="odd-label">xG CASA</div></div>
        <div class="odd-box"><div class="odd-val" style="color:#38bdf8">${pred.axg}</div><div class="odd-label">xG TRASFERTA</div></div>
        <div class="odd-box"><div class="odd-val" style="color:#a78bfa">${pred.goals}</div><div class="odd-label">GOL PREV.</div></div>
        <div class="odd-box"><div class="odd-val" style="color:${pred.over25>=60?'#4ade80':'#475569'}">${pred.over25}%</div><div class="odd-label">OVER 2.5</div></div>
        <div class="odd-box"><div class="odd-val" style="color:${pred.btts>=55?'#facc15':'#475569'}">${pred.btts}%</div><div class="odd-label">GG</div></div>
      </div>
    </div>
  </div>`;
}

function render(){
  const el=document.getElementById('content');
  if(currentTab==='future'){
    const list=UPCOMING.filter(f=>currentLeague==='all'||f.league===currentLeague)
      .sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff));
    el.innerHTML=`<div class="section-header">
      <span style="font-size:20px">🔮</span>
      <div>
        <div style="font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:#a78bfa">PREVISIONI AI — PROSSIME PARTITE</div>
        <div style="font-size:10px;color:#475569">Dixon-Coles + xG + forma + ranking</div>
      </div>
    </div>`+list.map(futureCard).join('');
    return;
  }
  const isHT=currentTab==='ht';
  const src=isHT?(liveHT||SEED_HT):(liveFT||SEED_FT);
  // ← SORT BY xG TOTALE (più alto in cima)
  const list=src
    .filter(m=>currentLeague==='all'||m.league===currentLeague)
    .map(m=>{const xg=calcXG(m);return{m,xg,prob:goalProb(m,xg,isHT)};})
    .sort((a,b)=>b.prob-a.prob);
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">${isHT?'⏱':'⚽'}</div><div style="font-size:16px;font-weight:800;color:#475569;margin-bottom:6px">Nessuna partita in corso</div><div style="font-size:12px">Controllo automatico ogni 45 secondi</div></div>`;
    return;
  }
  el.innerHTML=list.map(({m})=>matchCard(m,isHT)).join('');
}

function openAI(){
  document.getElementById('aiModal').style.display='flex';
  document.getElementById('aiContent').innerHTML='<span class="spinner"></span> <span style="margin-left:8px">Analisi xG in corso…</span>';
  const src=[...(liveHT||SEED_HT),...(liveFT||SEED_FT)].slice(0,6);
  const lines=src.map(m=>{
    const xg=calcXG(m);
    const prob=goalProb(m,xg,m.min<=44).toFixed(0);
    const hS=scorerProb(m,xg,'h').toFixed(0);
    const aS=scorerProb(m,xg,'a').toFixed(0);
    return `${m.home} vs ${m.away} | ${m.min}' | xG ${xg.h}-${xg.a} | prob gol: ${prob}% | prob segna: ${m.home} ${hS}% / ${m.away} ${aS}%`;
  }).join('\n');
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:400,
      messages:[{role:'user',content:`Sei un analista calcistico esperto. Partite live:\n${lines}\n\nFai 4 previsioni brevi e assertive di gol imminente. Per ognuna una riga:\n🎯 [Partita]: [squadra] segna — xG [num], forma [dato]. Max 150 parole totali.`}]
    })
  }).then(r=>r.json())
    .then(d=>{
      const text=d.content?.[0]?.text||'Nessuna previsione disponibile.';
      document.getElementById('aiContent').innerHTML=`<p style="font-size:13px;line-height:1.9;color:#cbd5e1;white-space:pre-line">${text}</p>`;
    })
    .catch(e=>{document.getElementById('aiContent').innerHTML=`<p style="color:#f87171">Errore: ${e.message}</p>`;});
}
function closeAI(){document.getElementById('aiModal').style.display='none';}

buildFilters();render();fetchLive();
setInterval(fetchLive,45000);
</script>
