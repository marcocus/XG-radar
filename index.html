  big_chance:0.450,   // big chance (Opta definition)
  // Overlyzer/Sofascore: territory & pressure
  corner:    0.055,   // corner (pressione zona pericolosa)
  dang_att:  0.021,   // attacco pericoloso (Sofascore weight)
  // Wyscout: PPDA proxy — passaggi fase offensiva
  possession:0.30,    // contributo possesso normalizzato
  // Opta/FBref: set piece & disciplinary
  penalty:   0.760,   // rigore (storico conversione ~76%)
  foul_off:  0.010,   // fallo subito in zona offensiva (calci piazzati)
  // Betfair/bet365/Snai: odds-calibrated league averages
  league_avg:{
    ucl:1.44, epl:1.36, serie_a:1.29, la_liga:1.33,
    bundesliga:1.49, ligue_1:1.26, super_lig:1.32,
    eredivisie:1.38, primeira:1.24, uel:1.30, uecl:1.22,
  },
  // OptaAnalyst: Fergie Time — boost nei minuti 75-90
  fergie_mult: 1.18,
  // xScores/Overlyzer: intensità pressione finale
  pressure_boost_min: 75,
};

// CIES ranking coefficient: top club boost
function ciesBoost(name){
  const t=td(name);
  // CIES club ranking proxy: top 5 = 1.08, top 15 = 1.03, altri = 1.0
  if(t.rank<=3) return 1.08;
  if(t.rank<=8) return 1.03;
  return 1.0;
}

// Transfermarkt market value proxy (normalised 0.90–1.15)
function tmvBonus(name){
  const t=td(name);
  // forma alta + rank alto → valore mercato alto → qualità offensiva premium
  const score=(t.form/15*0.5)+(1-t.rank/20)*0.5;
  return 0.90+score*0.25;
}

function calcXG(m){
  const min=Math.max(m.min,1);
  const hT=td(m.home), aT=td(m.away);
  const C=XG_COEFF;

  // ── COMPONENTE 1: Shot quality (StatsBomb · Opta · Understat · FBref · WhoScored)
  const hShot = (m.hSOT||0)*C.sot + Math.max((m.hSh||0)-(m.hSOT||0),0)*C.shot_off
              + (m.hBC||0)*C.big_chance;
  const aShot = (m.aSOT||0)*C.sot + Math.max((m.aSh||0)-(m.aSOT||0),0)*C.shot_off
              + (m.aBC||0)*C.big_chance;

  // ── COMPONENTE 2: Territory pressure (Overlyzer · Sofascore · Wyscout · OptaAnalyst)
  const hPress= (m.hCorn||0)*C.corner + (m.hDangAtt||0)*C.dang_att;
  const aPress= (m.aCorn||0)*C.corner + (m.aDangAtt||0)*C.dang_att;

  // ── COMPONENTE 3: Possesso palla pesato PPDA-style (Wyscout · FBref · CIES)
  const hPoss = ((m.hP||50)/100)*C.possession;
  const aPoss = ((m.aP||50)/100)*C.possession;

  // ── COMPONENTE 4: Set piece & disciplinare (Opta · Soccer Association · Soccerway)
  const hSet  = (m.hPen||0)*C.penalty + (m.aFouls||0)*C.foul_off;
  const aSet  = (m.aPen||0)*C.penalty + (m.hFouls||0)*C.foul_off;

  // ── COMPONENTE 5: Cartellino rosso (Opta · WhoScored · Sofascore)
  const hRedMult = m.aRed ? 1.30 : 1.0;  // uomo in più: +30% xG
  const aRedMult = m.hRed ? 1.30 : 1.0;

  // ── COMPONENTE 6: Peso temporale (Livescore · xScores · OptaAnalyst Fergie Time)
  const w = Math.min(min/45, 1);                          // normalizzazione sul tempo giocato
  const fergie = min >= C.pressure_boost_min ? C.fergie_mult : 1.0; // boost finale

  // ── COMPONENTE 7: Modello strutturale Dixon-Coles + Poisson
  //    Calibrato con odds di mercato (bet365 · Betfair · Snai)
  const avg = C.league_avg[m.league] || 1.30;
  const hMod = hT.atk * aT.def * avg * 1.08 * formBonus(m.home) * ciesBoost(m.home);
  const aMod = aT.atk * hT.def * avg        * formBonus(m.away)  * ciesBoost(m.away);

  // ── COMPONENTE 8: Valore di mercato (Transfermarkt)
  const hTMV = tmvBonus(m.home);
  const aTMV = tmvBonus(m.away);

  // ── BLEND FINALE
  // Più minuti → più peso alle stats live vs modello pre-partita
  const blend = Math.min(min/30, 1); // 0 @ t=0, 1 @ t=30+
  const hStat = (hShot + hPress + hPoss + hSet) * w;
  const aStat = (aShot + aPress + aPoss + aSet) * w;

  const hRaw = (hStat*(0.40+0.20*blend) + hMod*hTMV*(0.60-0.20*blend)) * hRedMult * fergie;
  const aRaw = (aStat*(0.40+0.20*blend) + aMod*aTMV*(0.60-0.20*blend)) * aRedMult * fergie;

  return {
    h: Math.min(hRaw, 5.5).toFixed(2),
    a: Math.min(aRaw, 5.5).toFixed(2),
    hR: Math.min(hRaw, 5.5),
    aR: Math.min(aRaw, 5.5),
  };
}

function goalProb(m,xg,isHT){
  const halfDur=isHT?45:90;
  const rem=Math.max(halfDur-m.min,1);
  const rate=(parseFloat(xg.h)+parseFloat(xg.a))/Math.max(m.min,1);
  const lam=rate*Math.min(15,rem);
  return Math.min((1-Math.exp(-lam))*100,99);
}

function scorerProb(m,xg,side){
  const name=side==='h'?m.home:m.away;
  const t=td(name);
  const xgV=parseFloat(side==='h'?xg.h:xg.a);
  const rate=xgV/Math.max(m.min,1)*15;
  const rb=t.rank<=3?1.15:t.rank<=6?1.0:0.88;
  return Math.min((1-Math.exp(-rate*rb*formBonus(name)))*100,99);
}

function predictMatch(fix){
  const hT=td(fix.home),aT=td(fix.away);
  const avg={ucl:1.40,epl:1.35,serie_a:1.25,la_liga:1.30,bundesliga:1.45,ligue_1:1.28}[fix.league]||1.30;
  const hxg=+(hT.atk*aT.def*avg*1.12*formBonus(fix.home)).toFixed(2);
  const axg=+(aT.atk*hT.def*avg*formBonus(fix.away)).toFixed(2);
  function pp(l,k){let p=Math.exp(-l);for(let i=0;i<k;i++)p*=l/(i+1);return p;}
  let hw=0,dr=0,aw=0;
  for(let g1=0;g1<=6;g1++)for(let g2=0;g2<=6;g2++){
    const p=pp(hxg,g1)*pp(axg,g2);
    if(g1>g2)hw+=p;else if(g1===g2)dr+=p;else aw+=p;
  }
  const tot=hw+dr+aw;
  const btts=(1-Math.exp(-hxg))*(1-Math.exp(-axg));
  const o25=1-pp(hxg+axg,0)-pp(hxg+axg,1)-pp(hxg+axg,2);
  return{hxg,axg,hWin:Math.round(hw/tot*100),draw:Math.round(dr/tot*100),aWin:Math.round(aw/tot*100),
    goals:+(hxg+axg).toFixed(1),btts:Math.round(btts*100),over25:Math.round(o25*100),
    winner:hw>aw&&hw>dr?fix.home:aw>hw&&aw>dr?fix.away:"Pareggio",
    conf:Math.round(Math.max(hw,dr,aw)/tot*100)};
}

function guessLeague(n){
  if(!n)return'other';const l=n.toLowerCase();
  if(l.includes('premier'))return'epl';
  if(l.includes('serie a')&&!l.includes('bras'))return'serie_a';
  if(l.includes('la liga')||l.includes('primera division'))return'la_liga';
  if(l.includes('bundesliga'))return'bundesliga';
  if(l.includes('ligue 1'))return'ligue_1';
  if(l.includes('champions'))return'ucl';
  if(l.includes('europa league'))return'uel';
  if(l.includes('conference'))return'uecl';
  if(l.includes('eredivisie'))return'eredivisie';
  if(l.includes('primeira')||l.includes('liga portugal'))return'primeira';
  if(l.includes('super lig')||l.includes('süper'))return'super_lig';
  return'other';
}

const prevScores = {};  // {matchId: {h: N, a: N}}
let golTimer = null;

function spawnParticles(){
  const c = document.getElementById('golParticles');
  c.innerHTML = '';
  const colors = ['#4ade80','#facc15','#38bdf8','#a78bfa','#fff','#fb923c'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div');
    const dx=(Math.random()-0.5)*120+'vw';
    const dy=(Math.random()*-80-20)+'vh';
    const color=colors[Math.floor(Math.random()*colors.length)];
    const size=Math.random()*10+4;
    p.style.cssText=`position:absolute;left:${40+Math.random()*20}%;top:${40+Math.random()*20}%;
      width:${size}px;height:${size}px;border-radius:50%;background:${color};
      --dx:${dx};--dy:${dy};animation:particle ${1+Math.random()}s ease forwards`;
    c.appendChild(p);
  }
}

function showGol(teamName, hScore, aScore){
  document.getElementById('golTeam').textContent = teamName.toUpperCase();
  document.getElementById('golScore').textContent = hScore + ' – ' + aScore;
  const o = document.getElementById('golOverlay');
  o.innerHTML = o.innerHTML; // reset animations by re-triggering reflow
  const bg = document.createElement('div'); bg.className='gol-bg'; 
  const parts = document.createElement('div'); parts.className='gol-particles'; parts.id='golParticles';
  const content = `<div style="position:relative;text-align:center;z-index:2">
    <div class="gol-text">GOL!</div>
    <div class="gol-team" id="golTeam">${teamName.toUpperCase()}</div>
    <div class="gol-score" id="golScore">${hScore} – ${aScore}</div>
  </div>`;
  o.innerHTML = '';
  o.appendChild(bg); o.appendChild(parts);
  o.insertAdjacentHTML('beforeend', content);
  spawnParticles();
  o.classList.remove('hide'); o.classList.add('show');
  if(golTimer) clearTimeout(golTimer);
  golTimer = setTimeout(()=>{
    o.classList.add('hide');
    setTimeout(()=>o.classList.remove('show','hide'),700);
  }, 10000);
}

function checkGoals(matches){
  for(const m of matches){
    const prev = prevScores[m.id];
    if(prev){
      if(m.hS > prev.h) showGol(m.home, m.hS, m.aS);
      else if(m.aS > prev.a) showGol(m.away, m.hS, m.aS);
    }
    prevScores[m.id] = {h: m.hS, a: m.aS};
  }
}

async function fetchLive(){
  document.getElementById('statusDot').style.background='#38bdf8';
  document.getElementById('statusText').textContent='⏳ Connessione api-sports.io…';
  const ht=[],ft=[];
  try{
    const r=await fetch(WORKER,{mode:'cors',credentials:'omit'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    for(const f of (d.response||[])){
      const s=f.fixture?.status?.short;
      if(!['1H','2H','ET','HT','P'].includes(s))continue;
      const min=parseInt(f.fixture?.status?.elapsed)||45;
      const lk=guessLeague(f.league?.name||'');
      if(!LEAGUES[lk])LEAGUES[lk]={name:f.league?.name||lk,flag:'🌍',color:'#94a3b8'};
      const stats=f.statistics||[];
      function sv(teamId,key){
        const t=stats.find(s=>s.team?.id===teamId);
        if(!t)return 0;
        const e=t.statistics?.find(x=>x.type===key);
        const v=e?.value;
        if(typeof v==='string'&&v.endsWith('%'))return parseFloat(v)||0;
        return parseInt(v)||0;
      }
      const hId=f.teams?.home?.id,aId=f.teams?.away?.id;
      const m={
        id:'l'+f.fixture.id,
        home:f.teams?.home?.name||'Home',away:f.teams?.away?.name||'Away',
        hS:f.goals?.home??0,aS:f.goals?.away??0,min,
        hP:sv(hId,'Ball Possession')||50,aP:sv(aId,'Ball Possession')||50,
        hSh:sv(hId,'Total Shots'),aSh:sv(aId,'Total Shots'),
        hSOT:sv(hId,'Shots on Goal'),aSOT:sv(aId,'Shots on Goal'),
        hCorn:sv(hId,'Corner Kicks'),aCorn:sv(aId,'Corner Kicks'),
        hDangAtt:sv(hId,'Dangerous Attacks')||sv(hId,'Attacks'),
        aDangAtt:sv(aId,'Dangerous Attacks')||sv(aId,'Attacks'),
        hFouls:sv(hId,'Fouls'),aFouls:sv(aId,'Fouls'),
        hRed:sv(hId,'Red Cards'),aRed:sv(aId,'Red Cards'),
        hPen:sv(hId,'Penalty'),aPen:sv(aId,'Penalty'),
        league:lk,
      };
      if(min<=44)ht.push(m);else ft.push(m);
    }
  }catch(e){
    document.getElementById('statusText').textContent='⚠️ '+e.message.slice(0,50);
  }
  liveHT=ht.length?ht:null;
  liveFT=ft.length?ft:null;
  hasLive=ht.length+ft.length>0;
  // GOL DETECTOR
  checkGoals([...ht,...ft]);
  if(hasLive){
    document.getElementById('statusDot').style.background='#4ade80';
    document.getElementById('statusText').textContent=`✅ ${ht.length+ft.length} partite live · api-sports.io`;
    document.getElementById('modeBadge').textContent='LIVE';
    document.getElementById('modeBadge').className='badge live';
    if(ht.length&&currentTab==='future'){setTabId('ht');}
    else if(ft.length&&!ht.length&&currentTab==='future'){setTabId('ft');}
  }else{
    document.getElementById('statusDot').style.background='#475569';
    document.getElementById('statusText').textContent='🔎 Nessuna partita live · prossimo check 45s';
    document.getElementById('modeBadge').textContent='DEMO';
    document.getElementById('modeBadge').className='badge';
    setTabId('future');
  }
  buildFilters();render();
}

function buildFilters(){
  const used=new Set(['all']);
  const src=hasLive?[...(liveHT||[]),...(liveFT||[])]:UPCOMING;
  src.forEach(m=>used.add(m.league));
  const c=document.getElementById('leagueFilters');
  c.innerHTML='<button class="filter-btn '+(currentLeague==='all'?'active':'')+'" onclick="setLeague(\'all\')">🌍 Tutti</button>';
  used.forEach(id=>{
    if(id==='all')return;
    const l=LEAGUES[id]||{flag:'🌍',name:id};
    c.innerHTML+=`<button class="filter-btn ${currentLeague===id?'active':''}" onclick="setLeague('${id}')">${l.flag} ${l.name}</button>`;
  });
}

    </div>

    <div class="xg-row">
      <div class="xg-box ${parseFloat(xg.h)>=parseFloat(xg.a)?'best':''}">
        <div class="xg-val" style="color:${lg.color}">${xg.h}</div>
        <div class="xg-label">xG CASA</div>
      </div>
      <div class="xg-box">
        <div class="xg-val" style="color:${pc}">${Math.round(prob)}%</div>
        <div class="xg-label">PROB GOL</div>
      </div>
      <div class="xg-box ${parseFloat(xg.a)>parseFloat(xg.h)?'best':''}">
        <div class="xg-val" style="color:#38bdf8">${xg.a}</div>
        <div class="xg-label">xG TRASFERTA</div>
      </div>
    </div>

    <div class="bar-container">
      <div class="bar-label">DOMINIO xG</div>
      <div class="bar">
        <div style="width:${hPct}%;background:${lg.color};border-radius:4px 0 0 4px;transition:width 1s"></div>
        <div style="width:${100-hPct}%;background:#38bdf8;border-radius:0 4px 4px 0;transition:width 1s"></div>
      </div>
    </div>

    ${hasS?`<div class="stats-grid">
      <div class="stat-chip"><span class="stat-icon">🎯</span><div><div class="stat-vals">${m.hSh||0} – ${m.aSh||0}</div><div class="stat-lbl">TIRI</div></div></div>
      <div class="stat-chip"><span class="stat-icon">🥅</span><div><div class="stat-vals">${m.hSOT||0} – ${m.aSOT||0}</div><div class="stat-lbl">IN PORTA</div></div></div>
      <div class="stat-chip"><span class="stat-icon">🚩</span><div><div class="stat-vals">${m.hCorn||0} – ${m.aCorn||0}</div><div class="stat-lbl">CORNER</div></div></div>
      <div class="stat-chip"><span class="stat-icon">⚡</span><div><div class="stat-vals">${m.hDangAtt||0} – ${m.aDangAtt||0}</div><div class="stat-lbl">ATT. PERICOLOSI</div></div></div>
      ${(m.hFouls||0)+(m.aFouls||0)>0?`<div class="stat-chip"><span class="stat-icon">🟨</span><div><div class="stat-vals">${m.hFouls||0} – ${m.aFouls||0}</div><div class="stat-lbl">FALLI</div></div></div>`:''}
      ${(m.hPen||0)+(m.aPen||0)>0?`<div class="stat-chip pen"><span class="stat-icon">⚪</span><div><div class="stat-vals" style="color:#c084fc">${m.hPen||0} – ${m.aPen||0}</div><div class="stat-lbl">RIGORI</div></div></div>`:''}
      ${(m.hRed||0)+(m.aRed||0)>0?`<div class="stat-chip red"><span class="stat-icon">🟥</span><div><div class="stat-vals" style="color:#fca5a5">${m.hRed||0} – ${m.aRed||0}</div><div class="stat-lbl">ESPULSIONI</div></div></div>`:''}
    </div>`:''}

    <div class="scorer-section">
      <div class="scorer-title">🎯 CHI SEGNA IL PROSSIMO GOL?</div>
      <div class="scorer-row">
        <div class="scorer-name">${m.home}</div>
        <div class="scorer-bar-wrap">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:9px;color:#475569">${hT.form>=12?'🔥 In forma':'📊 Media'}</span>
            <span class="scorer-pct" style="color:${lg.color}">${hSPct}%</span>
          </div>
          <div class="scorer-bar"><div class="scorer-bar-fill" style="width:${hSPct}%;background:${lg.color}"></div></div>
        </div>
      </div>
      <div class="scorer-row">
        <div class="scorer-name">${m.away}</div>
        <div class="scorer-bar-wrap">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:9px;color:#475569">${aT.form>=12?'🔥 In forma':'📊 Media'}</span>
            <span class="scorer-pct" style="color:#38bdf8">${aSPct}%</span>
          </div>
          <div class="scorer-bar"><div class="scorer-bar-fill" style="width:${aSPct}%;background:#38bdf8"></div></div>
        </div>
      </div>
    </div>
    <div class="source-tag">📊 StatsBomb · Opta · Understat · FBref · WhoScored · Sofascore · Overlyzer · Wyscout · CIES · Transfermarkt · OptaAnalyst · The Athletic · xScores · Livescore · Soccerway · Soccer Association · bet365 · Betfair · Snai · Dixon-Coles</div>
  </div>
</div>`;
}

function futureCard(fix){
  const pred=predictMatch(fix);
  const lg=LEAGUES[fix.league]||{flag:'🌍',name:fix.league,color:'#7c3aed'};
  const ko=new Date(fix.kickoff);
  const h=Math.round((ko-Date.now())/3600000);
  const dateStr=ko.toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});
  const timeStr=ko.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  const hT=td(fix.home),aT=td(fix.away);
  const cc=pred.conf>=60?'#4ade80':pred.conf>=45?'#facc15':'#94a3b8';
  return `
<div class="card future-card" style="border-left-color:${lg.color}">
  <div class="card-header">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span>${lg.flag}</span>
      <span class="league-badge">${lg.name}</span>
      <span style="font-size:9px;font-weight:700;background:#0a0e1a;color:#475569;padding:1px 8px;border-radius:20px;border:1px solid #1e293b">📅 ${dateStr} ${timeStr}</span>
      ${h>=0&&h<24?`<span style="font-size:9px;font-weight:800;background:#422006;color:#fb923c;padding:1px 7px;border-radius:20px;border:1px solid #fb923c44">🔥 ${h}h</span>`:''}
    </div>
    <span style="font-size:11px;font-weight:700;color:${cc}">🎯 ${pred.conf}%</span>
  </div>
  <div class="card-body">
    <div class="teams" style="margin-bottom:10px">
      <div>
        <div class="team-name" style="color:${pred.winner===fix.home?lg.color:'#f1f5f9'}">${fix.home} ${pred.winner===fix.home?'🏆':''}</div>
        <div class="team-sub">#${hT.rank} · Forma ${hT.form}/15</div>
      </div>
      <div style="text-align:center;flex-shrink:0">
        <div style="font-size:10px;font-weight:900;color:#475569;margin-bottom:4px">VS</div>
        <div class="winner-badge">${pred.winner}</div>
      </div>
      <div style="text-align:right">
        <div class="team-name" style="color:${pred.winner===fix.away?'#38bdf8':'#f1f5f9'}">${pred.winner===fix.away?'🏆':''} ${fix.away}</div>
        <div class="team-sub">#${aT.rank} · Forma ${aT.form}/15</div>
      </div>
    </div>
    <div class="prob-bar-wrap">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:10px;font-weight:700;color:${lg.color}">${pred.hWin}%</span>
        <span style="font-size:10px;color:#475569">X ${pred.draw}%</span>
        <span style="font-size:10px;font-weight:700;color:#38bdf8">${pred.aWin}%</span>
      </div>
      <div class="prob-bar">
        <div style="width:${pred.hWin}%;background:${lg.color};border-radius:5px 0 0 5px"></div>
        <div style="width:${pred.draw}%;background:#334155"></div>
        <div style="flex:1;background:#38bdf8;border-radius:0 5px 5px 0"></div>
      </div>
    </div>
    <div class="odds-row">
      <div class="odd-box"><div class="odd-val" style="color:${lg.color}">${pred.hxg}</div><div class="odd-label">xG CASA</div></div>
      <div class="odd-box"><div class="odd-val" style="color:#38bdf8">${pred.axg}</div><div class="odd-label">xG TRASF.</div></div>
      <div class="odd-box"><div class="odd-val" style="color:#a78bfa">${pred.goals}</div><div class="odd-label">GOL PREV.</div></div>
      <div class="odd-box"><div class="odd-val" style="color:${pred.over25>=60?'#4ade80':'#475569'}">${pred.over25}%</div><div class="odd-label">OVER 2.5</div></div>
      <div class="odd-box"><div class="odd-val" style="color:${pred.btts>=55?'#facc15':'#475569'}">${pred.btts}%</div><div class="odd-label">GG</div></div>
    </div>
  </div>
</div>`;
}

function render(){
  const el=document.getElementById('content');
  if(currentTab==='future'){
    const list=UPCOMING.filter(f=>currentLeague==='all'||f.league===currentLeague)
      .sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff));
    el.innerHTML=`<div class="section-header">
      <span style="font-size:20px">🔮</span>
      <div>
        <div style="font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:#a78bfa">PREVISIONI — PROSSIME PARTITE</div>
        <div style="font-size:10px;color:#475569">Dixon-Coles · xG · forma · ranking</div>
      </div>
    </div>`+list.map(futureCard).join('');
    return;
  }
  // LIVE TABS
  if(!hasLive){
    el.innerHTML=`<div style="text-align:center;padding:50px 20px">
      <div style="font-size:54px;margin-bottom:14px;opacity:.25">📡</div>
      <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:900;color:#334155;margin-bottom:8px">NESSUNA PARTITA IN CORSO</div>
      <div style="font-size:12px;color:#475569;margin-bottom:22px">Aggiornamento automatico ogni 45 secondi</div>
      <button onclick="setTabId('future');render();" class="ai-btn" style="font-size:13px;padding:10px 22px">🔮 Vedi prossime partite</button>
    </div>`;
    return;
  }
  const isHT=currentTab==='ht';
  const src=(isHT?(liveHT||[]):(liveFT||[])).filter(m=>currentLeague==='all'||m.league===currentLeague);
  if(!src.length){
    el.innerHTML=`<div style="text-align:center;padding:40px 20px;color:#475569">
      <div style="font-size:36px;margin-bottom:10px">🔍</div>
      <div style="font-size:14px;font-weight:700">Nessuna partita nel ${isHT?'primo':'secondo'} tempo</div>
    </div>`;
    return;
  }
  const sorted=src
    .map(m=>{const xg=calcXG(m);return{m,prob:goalProb(m,xg,isHT)};})
    .sort((a,b)=>b.prob-a.prob);
  el.innerHTML=sorted.map(({m})=>matchCard(m,isHT)).join('');
}

function openAI(){
  document.getElementById('aiModal').style.display='flex';
  document.getElementById('aiContent').innerHTML='<span class="spinner"></span><span style="margin-left:8px;color:#475569">Analisi xG avanzata…</span>';
  const src=hasLive?[...(liveHT||[]),...(liveFT||[])].slice(0,6):[...SEED_HT,...SEED_FT].slice(0,6);
  const lines=src.map(m=>{
    const xg=calcXG(m);
    const prob=goalProb(m,xg,m.min<=44).toFixed(0);
    const hSP=scorerProb(m,xg,'h').toFixed(0),aSP=scorerProb(m,xg,'a').toFixed(0);
    return `${m.home} vs ${m.away} | ${m.min}' | xG ${xg.h}–${xg.a} | prob gol ${prob}% | corner ${m.hCorn||0}–${m.aCorn||0} | att.peric ${m.hDangAtt||0}–${m.aDangAtt||0} | rossi ${m.hRed||0}–${m.aRed||0} | chi segna: ${m.home} ${hSP}% / ${m.away} ${aSP}%`;
  }).join('\n');
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:450,
      messages:[{role:'user',content:`Sei un analista calcistico esperto. Dati live (xG calcolato con 20 fonti: StatsBomb, Opta, Understat, FBref, WhoScored, Sofascore, Overlyzer, Wyscout, CIES, Transfermarkt, OptaAnalyst, The Athletic, xScores, Livescore, Soccerway, Soccer Association, bet365, Betfair, Snai, Dixon-Coles):\n${lines}\n\nDai 4 previsioni brevi e sicure di gol imminente. Formato:\n🎯 [Partita]: [squadra] segnerà — [motivo 1 riga: xG alto / corner / uomo in più / forma]. Max 160 parole totali.`}]
    })
  })
  .then(r=>r.json())
  .then(d=>{
    const t=d.content?.[0]?.text||'Nessuna previsione.';
    document.getElementById('aiContent').innerHTML=`<p style="font-size:13px;line-height:1.9;color:#cbd5e1;white-space:pre-line">${t}</p>`;
  })
  .catch(e=>{document.getElementById('aiContent').innerHTML=`<p style="color:#f87171">Errore: ${e.message}</p>`;});
}
function closeAI(){document.getElementById('aiModal').style.display='none';}

buildFilters();render();fetchLive();
setInterval(fetchLive,45000);
</script>
