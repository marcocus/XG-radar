// ── BZZOIRO sports API (gratuita, illimitata, CORS ok) ───────────────────────
const BSD_KEY = “1cfa969095362b1702b861a22c6c98ee986cb76a”;
const BSD_URL = “https://sports.bzzoiro.com”;

// Map league name → internal key (case-insensitive contains)
function guessLeague(name) {
if (!name) return “other”;
const n = name.toLowerCase();
if (n.includes(“premier league”) && (n.includes(“eng”) || n.includes(“england”))) return “epl”;
if (n.includes(“premier league”))   return “epl”;
if (n.includes(“serie a”) && (n.includes(“ital”) || n.includes(“italy”))) return “serie_a”;
if (n.includes(“serie a”) && n.includes(“bras”)) return “serie_a_br”;
if (n.includes(“serie a”))           return “serie_a”;
if (n.includes(“la liga”) || n.includes(“primera division”)) return “la_liga”;
if (n.includes(“bundesliga”) && !n.includes(“2.”)) return “bundesliga”;
if (n.includes(“ligue 1”))           return “ligue_1”;
if (n.includes(“champions league”))  return “ucl”;
if (n.includes(“europa league”))     return “uel”;
if (n.includes(“conference league”)) return “uecl”;
if (n.includes(“eredivisie”))        return “eredivisie”;
if (n.includes(“primeira liga”) || n.includes(“liga portugal”)) return “primeira”;
if (n.includes(“süper lig”) || n.includes(“super lig”)) return “super_lig”;
if (n.includes(“1. lig”) && n.includes(“turk”)) return “super_lig”;
if (n.includes(“fa cup”))            return “fa_cup”;
if (n.includes(“carabao”) || n.includes(“league cup”)) return “carabao”;
if (n.includes(“coppa italia”))      return “coppa_it”;
if (n.includes(“dfb-pokal”) || n.includes(“dfb pokal”)) return “dfb_pokal”;
if (n.includes(“coupe de france”))   return “coupe_fr”;
if (n.includes(“copa del rey”))      return “copa_del_rey”;
if (n.includes(“championship”))      return “championship”;
if (n.includes(“scottish”))          return “scottish_pl”;
if (n.includes(“jupiler”) || (n.includes(“pro league”) && n.includes(“belg”))) return “jupiler”;
if (n.includes(“brasileir”))         return “serie_a_br”;
if (n.includes(“mls”))               return “mls”;
if (n.includes(“liga mx”))           return “liga_mx”;
// Campionati minori / giovanili / sconosciuti → “other” con nome originale
return “other”;
}

// Ensure dynamic leagues exist in LEAGUES object at runtime
function ensureLeague(key, name, flag) {
if (!LEAGUES[key]) {
LEAGUES[key] = { name: name || key, flag: flag || “🌍”, color: “#475569” };
}
}

async function bsdFetch(path) {
const res = await fetch(BSD_URL + path, {
headers: { “Authorization”: “Token “ + BSD_KEY }
});
if (!res.ok) throw new Error(“HTTP “ + res.status);
return res.json();
}

function bsdToMatch(ev, i) {
const leagueName = ev.league?.name || ev.tournament?.name || ev.competition || “”;
const leagueKey  = guessLeague(leagueName);
ensureLeague(leagueKey, leagueName, ev.league?.flag || ev.tournament?.flag || “🌍”);

const elapsed = parseInt(ev.minute || ev.time_elapsed || ev.match_time || 45) || 45;
const stats   = ev.statistics || ev.stats || {};

const hSh  = parseInt(stats.home_shots        || stats.shots_home        || 0) || Math.round(elapsed/90*12);
const aSh  = parseInt(stats.away_shots        || stats.shots_away        || 0) || Math.round(elapsed/90*10);
const hSOT = parseInt(stats.home_shots_on_target || stats.sot_home       || 0) || Math.round(hSh*0.4);
const aSOT = parseInt(stats.away_shots_on_target || stats.sot_away       || 0) || Math.round(aSh*0.35);
const hP   = parseInt(stats.home_possession   || stats.possession_home   || 0) || 50;
const aP   = 100 - hP;

return {
id:    “bsd_” + (ev.id || i),
home:  ev.home_team?.name || ev.home?.name || ev.home_name || “Home”,
away:  ev.away_team?.name || ev.away?.name || ev.away_name || “Away”,
hS:    ev.home_score ?? ev.score?.home ?? 0,
aS:    ev.away_score ?? ev.score?.away ?? 0,
min:   elapsed,
hP, aP, hSh, aSh, hSOT, aSOT,
league: leagueKey,
odds:  ev.odds || null,
xgH:   ev.predictions?.xg_home || ev.xg_home || null,
xgA:   ev.predictions?.xg_away || ev.xg_away || null,
};
}

// ─── COMPOSITE xG ENGINE ──────────────────────────────────────────────────────
// Layer 1: Shot-based live xG (what’s happening on pitch right now)
function liveXG(m) {
const hRaw = m.hSOT * 0.30 + (m.hSh - m.hSOT) * 0.04 + (m.hP / 100) * 0.5;
const aRaw = m.aSOT * 0.30 + (m.aSh - m.aSOT) * 0.04 + (m.aP / 100) * 0.5;
return { h: Math.min(hRaw, 4.5), a: Math.min(aRaw, 4.5) };
}

// Layer 2: Season-model xG (Dixon-Coles style: attack × opponent defense × base)
const LEAGUE_AVG_GOALS = 2.65; // European average goals per match
function modelXG(m) {
const hT = teamData(m.home), aT = teamData(m.away);
// Expected goals if full match: home attack × away defense × league avg
const homeExpected = hT.atk * aT.def * (LEAGUE_AVG_GOALS / 2) * 1.08; // home advantage
const awayExpected = aT.atk * hT.def * (LEAGUE_AVG_GOALS / 2);
return { h: homeExpected, a: awayExpected };
}

// Layer 3: Form momentum bonus (hot team gets up to +15% boost)
function formBonus(name) {
const t = teamData(name);
return 1 + (t.form - 7.5) / 7.5 * 0.15; // range ~0.85–1.15
}

// Blended xG: 60% live data, 40% season model, weighted by minutes played
function calcXG(m) {
const minWeight = Math.min(m.min / 45, 1); // live data gains weight as match progresses
const live  = liveXG(m);
const model = modelXG(m);
const fH = formBonus(m.home), fA = formBonus(m.away);

const blendH = (live.h * minWeight * 0.6 + model.h * 0.4) * fH;
const blendA = (live.a * minWeight * 0.6 + model.a * 0.4) * fA;
return {
h:      Math.min(blendH, 4.5).toFixed(2),
a:      Math.min(blendA, 4.5).toFixed(2),
liveH:  live.h.toFixed(2),
liveA:  live.a.toFixed(2),
modelH: model.h.toFixed(2),
modelA: model.a.toFixed(2),
};
}

// ─── PROBABILITY ENGINE ───────────────────────────────────────────────────────
// Poisson P(≥1 goal) in next N minutes using blended λ
function goalProb(m, xg, isHT) {
const totalMin  = isHT ? 45 : 90;
const remaining = Math.max(totalMin - m.min, 1);
const used      = Math.max(m.min, 1);
const totalXG   = parseFloat(xg.h) + parseFloat(xg.a);
// Rate per minute from actual pace
const ratePerMin = totalXG / used;
const window = Math.min(15, remaining);
const λ = ratePerMin * window;
return Math.min((1 - Math.exp(-λ)) * 100, 99);
}

// Per-team scoring chance: blended xG rate + form + rank pressure
function teamScoringProb(m, xg, side) {
const name = side === “h” ? m.home : m.away;
const t    = teamData(name);
const xgVal = parseFloat(side === “h” ? xg.h : xg.a);
const used  = Math.max(m.min, 1);
const pace  = xgVal / used * 15; // expected in 15 min
// Rank pressure: top-4 team scores more often in pressure situations
const rankBoost = t.rank <= 4 ? 1.12 : t.rank <= 8 ? 1.0 : 0.90;
const λ = pace * rankBoost * formBonus(name);
return Math.min((1 - Math.exp(-λ)) * 100, 99);
}

// Composite “opportunity score” — higher = real danger of goal
function opportunityScore(m, xg) {
const hT = teamData(m.home), aT = teamData(m.away);
// Shot conversion rate proxy
const hConv = m.hSh > 0 ? m.hSOT / m.hSh : 0;
const aConv = m.aSh > 0 ? m.aSOT / m.aSh : 0;
const hScore = (parseFloat(xg.h) * 0.4 + hConv * 0.3 + hT.atk * 0.3) * formBonus(m.home);
const aScore = (parseFloat(xg.a) * 0.4 + aConv * 0.3 + aT.atk * 0.3) * formBonus(m.away);
return { h: hScore, a: aScore, total: hScore + aScore };
}

// Next scorer probability split
function nextScorer(m, xg) {
const hP = teamScoringProb(m, xg, “h”);
const aP = teamScoringProb(m, xg, “a”);
const tot = hP + aP || 1;
return { hPct: Math.round(hP / tot * 100), aPct: Math.round(aP / tot * 100), hRaw: hP, aRaw: aP };
}

// Get defenders for a team
function teamDefenders(teamName) {
return Object.entries(DEFENDERS)
.filter(([_, d]) => d.team === teamName || teamName.includes(d.team) || d.team.includes(teamName.split(” “)[0]))
.map(([name, d]) => ({ name, …d }));
}

// Score a defender’s chance to score in THIS match context
function defenderGoalScore(def, m, xg, side) {
const teamXG   = parseFloat(side === “h” ? xg.h : xg.a);
const oppDef   = teamData(side === “h” ? m.away : m.home).def;
const corners  = side === “h” ? m.hSh / Math.max(m.min,1) * 3 : m.aSh / Math.max(m.min,1) * 3; // proxy corners
// Base: goals per season * team xG factor * set piece opportunities * aerial ability
const score = (def.goals * 0.04)            // historical goal rate
+ (def.set_pieces * 0.08)        // set piece threat
+ (def.heading / 100 * 0.15)     // aerial ability
+ (teamXG * 0.12)                // team is creating chances
+ (corners * def.corners * 0.05) // corner volume
- (oppDef * 0.08);               // opponent defensive strength
return Math.max(0, Math.min(score * 100, 35)); // cap at 35%
}

// Top 2 defender threats per side
function topDefenderThreats(m, xg) {
const result = [];
for (const side of [“h”,“a”]) {
const teamName = side === “h” ? m.home : m.away;
const defs = teamDefenders(teamName);
const scored = defs.map(d => ({
…d,
prob: defenderGoalScore(d, m, xg, side),
side,
teamName,
})).sort((a,b) => b.prob - a.prob).slice(0,2);
result.push(…scored);
}
return result.sort((a,b) => b.prob - a.prob).slice(0,4);
}

function predictMatch(fix) {
const hT = teamData(fix.home), aT = teamData(fix.away);
const lg = LEAGUES[fix.league];
const leagueAvg = { epl:1.35, serie_a:1.25, la_liga:1.30, bundesliga:1.45, ligue_1:1.28, ucl:1.40 }[fix.league] || 1.30;
const homeBonus = 1.12;
// Dixon-Coles xG
const hxg = +(hT.atk * aT.def * leagueAvg * homeBonus * formBonus(fix.home)).toFixed(2);
const axg = +(aT.atk * hT.def * leagueAvg * formBonus(fix.away)).toFixed(2);
// Poisson win probabilities
function poissonProb(lambda, k) {
let p = Math.exp(-lambda); for(let i=0;i<k;i++) p*=lambda/(i+1); return p;
}
let hWin=0, draw=0, aWin=0;
for(let g1=0;g1<=6;g1++) for(let g2=0;g2<=6;g2++) {
const p = poissonProb(hxg,g1)*poissonProb(axg,g2);
if(g1>g2) hWin+=p; else if(g1===g2) draw+=p; else aWin+=p;
}
const tot = hWin+draw+aWin;
const predictedGoals = +(hxg+axg).toFixed(1);
const btts = (1-Math.exp(-hxg))*(1-Math.exp(-axg));
const over25 = 1-poissonProb(hxg+axg,0)-poissonProb(hxg+axg,1)-poissonProb(hxg+axg,2);
// Top defender threats for this match (simulate min=45)
const simMatch = { …fix, hS:0,aS:0,min:45,hP:50,aP:50,hSh:6,aSh:5,hSOT:3,aSOT:2 };
const simXg = { h:String(hxg), a:String(axg) };
const defThreats = topDefenderThreats(simMatch, simXg);
return {
hxg, axg,
hWin: Math.round(hWin/tot*100),
draw:  Math.round(draw/tot*100),
aWin:  Math.round(aWin/tot*100),
predictedGoals,
btts:  Math.round(btts*100),
over25: Math.round(over25*100),
defThreats,
winner: hWin>aWin && hWin>draw ? fix.home : aWin>hWin && aWin>draw ? fix.away : “Pareggio”,
confidence: Math.round(Math.max(hWin,draw,aWin)/tot*100),
};
}

function danger(prob) {
const p = parseFloat(prob);
if (p >= 75) return { label:“⚡ MOLTO PROBABILE”, bg:”#f0fdf4”, text:”#15803d”, dot:”#22c55e”, border:”#86efac”, blink:true  };
if (p >= 50) return { label:“🟡 PROBABILE”,       bg:”#fefce8”, text:”#854d0e”, dot:”#eab308”, border:”#fde047”, blink:false };
if (p >= 30) return { label:“⬜ NEUTRO”,           bg:”#f8fafc”, text:”#64748b”, dot:”#94a3b8”, border:”#e2e8f0”, blink:false };
return             { label:“🔴 POCO PROBABILE”,   bg:”#fff1f2”, text:”#be123c”, dot:”#f43f5e”, border:”#fecdd3”, blink:false };
}

            </div>
          </div>
        </button>
      </div>
    </div>
  </div>

  {/* ── MATCH LIST ── */}
  <div style={{ maxWidth:620, margin:"0 auto", padding:"14px 12px" }}>
    {section === "future" ? (
      <div>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14, padding:"10px 14px", background:"#ede9fe", borderRadius:12 }}>
          <span style={{ fontSize:20 }}>🔮</span>
          <div>

        </div>
        {UPCOMING_FIXTURES
          .filter(f => league === "all" || f.league === league)

          .map(fix => <FutureCard key={fix.id} fix={fix} leagueFilter="all" />)

    ) : section === "ht" ? (
      htList.length === 0 ? (

      ftList.length === 0 ? (
        <div style={{ textAlign:"center", padding:"64px 20px" }}>
          <div style={{ fontSize:52, marginBottom:16 }}>⚽</div>

          </div>
          <div style={{ fontSize:12, color:"#94a3b8", lineHeight:1.7 }}>
            {apiStatus === "loading"
              ? "Connessione ad API-Football in corso…"

          </div>
          <div style={{ marginTop:20, display:"inline-flex", alignItems:"center", gap:6, background:"#f0fdf4", border:"1px solid #86efac", borderRadius:20, padding:"6px 14px" }}>

    )}
  </div>

  {showAI && <AIModal htMatches={htList} ftMatches={ftList} onClose={()=>setShowAI(false)} />}
</div>
